# DevCell Taskfile. See README.md
version: '3'

vars:
  GIT_COMMIT_HASH:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
  BUILD_DATE:
    sh: date -u +%Y%m%dT%H%M%SZ
  CELL_LDFLAGS: -s -w -X github.com/DimmKirr/devcell/internal/version.GitCommit={{.GIT_COMMIT_HASH}} -X github.com/DimmKirr/devcell/internal/version.BuildDate={{.BUILD_DATE}}

env:
  BUILDKIT_PROGRESS: plain

tasks:

  swag:generate:
    desc: Regenerate Swagger docs from annotations
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - go run github.com/swaggo/swag/cmd/swag@latest init -g cmd/serve.go -o docs --parseDependency --parseInternal

  cell:build:
    desc: Build cell CLI binary
    dir: "{{.TASKFILE_DIR}}"
    deps: [swag:generate]
    cmds:
      - CGO_ENABLED=0 go build -ldflags "{{.CELL_LDFLAGS}}" -o ~/.local/bin/cell ./cmd/

  cell:install:
    aliases: [install]
    desc: Build and install cell binary to ~/.local/bin/cell
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - task: cell:build
      - mkdir -p ~/.local/bin
      - echo "Installed to ~/.local/bin/cell"

  image:build:base:
    desc: Build local base images into local Docker daemon (host platform only, no push)
    aliases: [image:build, bake:local]
    silent: true
    cmds:
      - USER_UID=$(id -u) USER_GID=$(id -g) GIT_COMMIT={{.GIT_COMMIT_HASH}} NIX_CACHE_IMAGE=public.ecr.aws/docker/library/debian:trixie-slim PLATFORMS="" docker buildx bake --file {{.TASKFILE_DIR}}/docker-bake.hcl --load local {{.CLI_ARGS}}

  image:build:ultimate:
    desc: Build ultimate base image locally (FROM base, adds nix ultimate stack + KiCad)
    silent: true
    cmds:
      - USER_UID=$(id -u) USER_GID=$(id -g) GIT_COMMIT={{.GIT_COMMIT_HASH}} NIX_CACHE_IMAGE=public.ecr.aws/docker/library/debian:trixie-slim PLATFORMS="" docker buildx bake --file {{.TASKFILE_DIR}}/docker-bake.hcl --load local-ultimate {{.CLI_ARGS}}

  image:build:user-local:dev:
    desc: "Build user image for dev/test (wraps: cell init --force --yes --local-nixhome)"
    aliases: [image:dev]
    dir: "{{.TASKFILE_DIR}}"
    env:
      XDG_CONFIG_HOME: "{{.TASKFILE_DIR}}/test/testdata/devcell-config-simple"
      DEVCELL_BASE_IMAGE: "ghcr.io/dimmkirr/devcell:core-local"
      DEVCELL_NIXHOME_PATH: "{{.TASKFILE_DIR}}/nixhome"
    cmds:
      - cell build --debug {{.CLI_ARGS}}

  image:build:user-local:force:
    desc: "Build user image for dev/test (wraps: cell init --force --yes --local-nixhome)"
    aliases: [image:dev]
    dir: "{{.TASKFILE_DIR}}"
    env:
      XDG_CONFIG_HOME: "{{.TASKFILE_DIR}}/test/testdata/devcell-config-simple"
      DEVCELL_BASE_IMAGE: "ghcr.io/dimmkirr/devcell:core-local"
    cmds:
      - cell init --force --yes --local-nixhome {{.TASKFILE_DIR}}/nixhome --debug {{.CLI_ARGS}}

  image:push:
    desc: Build ci group and push to registry (multi-arch)
    silent: true
    cmds:
      - GIT_COMMIT={{.GIT_COMMIT_HASH}} docker buildx bake --file {{.TASKFILE_DIR}}/docker-bake.hcl --push ci {{.CLI_ARGS}}

  nix:validate:
    desc: Validate all nixhome stacks — syntax check then attr check (no build, no activation)
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - |
        set -e
        NIX_BIN=/opt/devcell/.local/state/nix/profiles/profile/bin
        FLAKE="{{.TASKFILE_DIR}}/nixhome"

        echo "=== 1/2 Syntax check (nix-instantiate --parse) ==="
        FAIL=0
        for f in $(find nixhome -name '*.nix'); do
          if sudo "$NIX_BIN/nix-instantiate" --parse "$f" >/dev/null 2>&1; then
            echo "  OK   $f"
          else
            echo "  FAIL $f"
            sudo "$NIX_BIN/nix-instantiate" --parse "$f" 2>&1 | grep 'error:' >&2
            FAIL=1
          fi
        done
        [ "$FAIL" -eq 0 ] || exit 1

        echo ""
        echo "=== 2/2 Attr check (nix eval, no build) ==="
        ARCH=$(uname -m)
        [ "$ARCH" = "aarch64" ] && SUFFIX="-aarch64" || SUFFIX=""
        for stack in base go node python fullstack electronics ultimate; do
          CFG="devcell-${stack}${SUFFIX}"
          printf "  %-40s" "$CFG"
          COUNT=$(sudo "$NIX_BIN/nix" eval \
            "${FLAKE}#homeConfigurations.${CFG}.config.home.packages" \
            --apply 'builtins.length' --json 2>/dev/null) \
            && echo "OK ($COUNT packages)" \
            || { echo "FAIL"; sudo "$NIX_BIN/nix" eval \
              "${FLAKE}#homeConfigurations.${CFG}.config.home.packages" \
              --apply 'builtins.length' --json 2>&1 | grep 'error:' >&2; exit 1; }
        done
        echo ""
        echo "All stacks valid."

  test:
    desc: Run the full container integration test suite
    silent: true
    cmds:
      - go test -v -timeout 120s ./test/... {{.CLI_ARGS}}

  test:vagrant:
    desc: Run E2E install test in a clean Debian VM (QEMU). Requires vagrant + vagrant-qemu plugin.
    dir: "{{.TASKFILE_DIR}}/test/vagrant"
    cmds:
      - vagrant up --provider=qemu
      - defer: vagrant destroy -f
    env:
      CELL_VERSION: '{{.CELL_VERSION | default "0.0.0"}}'

  web:docs:
    desc: Generate cell CLI markdown reference for the website (requires Go)
    silent: true
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - go run $(ls cmd/*.go | grep -Ev '(_test|main)\.go') web/src/content/cell

  web:start:
    desc: Start Astro dev server for the DevCell landing page
    silent: true
    dir: "{{.TASKFILE_DIR}}/web"
    cmds:
      - npm install
      - npm run dev
