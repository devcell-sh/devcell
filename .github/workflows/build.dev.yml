name: Dev Build

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches:
      - main
      - feature/wip
      - feature/add-web
      - feature/web
  workflow_dispatch:
    inputs:
      skip_nix_cache:
        description: 'Skip nix cache (genesis mode — full rebuild, no pre-seeding)'
        type: boolean
        default: false

permissions:
  contents: write
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  secrets:
    name: Detect Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      # gitleaks CLI directly — bypasses gitleaks-action's org-license
      # requirement (the license gate lives in the action wrapper, not the
      # scanner). `detect` exits 1 if leaks are found.
      - name: Run gitleaks
        run: |
          docker run --rm -v "$PWD:/repo" -w /repo \
            ghcr.io/gitleaks/gitleaks:latest \
            detect --source=. --verbose --redact

  docker-build:
    name: Docker Build (${{ matrix.arch }})
    needs: secrets
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5

      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LC=${IMAGE_NAME,,}" >> $GITHUB_ENV

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af
          df -h


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # task cell:build = swagger:generate → CGO_ENABLED=0 go build with ldflags
      # for GitCommit + BuildDate. Single source of truth shared with local dev
      # (`task cell:build` works the same on a developer machine).
      - name: Build cell binary
        run: task cell:build

      # Cache the nix-store as a tar dump (not the raw Docker volume directory).
      # The volume directory under `/var/lib/docker/volumes/<name>/_data` is
      # root-owned by the docker daemon — actions/cache runs as the `runner`
      # user and silently produces an empty archive when it hits permission
      # errors, so the old path-based cache step never actually saved
      # anything (verified via the `actions/caches` API). Caching a tar file
      # at a runner-owned path sidesteps the whole permission issue.
      - name: Restore /nix volume tar (cache)
        if: inputs.skip_nix_cache != true
        id: nix-cache
        uses: actions/cache@v4
        with:
          path: /tmp/devcell-cache/nix-store.tar
          key: devcell-nix-store-tar-${{ matrix.arch }}-${{ hashFiles('nixhome/**') }}
          restore-keys: |
            devcell-nix-store-tar-${{ matrix.arch }}-

      # If the cache produced a tar, hydrate the named volume from it BEFORE
      # `cell build --thin` runs — so the build is incremental against
      # previously-realized nix derivations.
      - name: Hydrate /nix volume from tar (if cache hit)
        if: steps.nix-cache.outputs.cache-hit == 'true' || hashFiles('/tmp/devcell-cache/nix-store.tar') != ''
        run: |
          set -e
          docker volume create devcell-nix-store-${{ matrix.arch }} >/dev/null
          docker run --rm \
            -v devcell-nix-store-${{ matrix.arch }}:/nix \
            -v /tmp/devcell-cache:/cache:ro \
            alpine sh -c 'cd /nix && tar -xf /cache/nix-store.tar && echo "hydrated $(du -sh /nix | cut -f1)"'

      # Build both stacks sequentially in the same job so the nix-store
      # volume accumulates derivations from both — single tar dump at job
      # end carries everything needed by docker-test. `cell build --thin`
      # reuses store paths across the two invocations (nix is
      # content-addressed), so ultimate after base is incremental.
      - name: Build thin image (base stack)
        env:
          DEVCELL_NIX_VOLUME: devcell-nix-store-${{ matrix.arch }}
          DEVCELL_NIXHOME_PATH: ${{ github.workspace }}/nixhome
        run: |
          BASE_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:v0.0.0-${{ matrix.arch }}-base"
          ./bin/cell build --thin --stack base --image "$BASE_TAG" --debug
          echo "BASE_TAG=$BASE_TAG" >> "$GITHUB_ENV"

      - name: Build thin image (ultimate stack)
        env:
          DEVCELL_NIX_VOLUME: devcell-nix-store-${{ matrix.arch }}
          DEVCELL_NIXHOME_PATH: ${{ github.workspace }}/nixhome
        run: |
          ULT_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:v0.0.0-${{ matrix.arch }}-ultimate"
          ./bin/cell build --thin --stack ultimate --image "$ULT_TAG" --debug
          echo "ULT_TAG=$ULT_TAG" >> "$GITHUB_ENV"

      - name: Push to GHCR (both stacks)
        run: |
          docker push "$BASE_TAG"
          docker push "$ULT_TAG"

      # Investigate-and-dump: print volume metadata to logs (host-side and
      # container-side) and tar the volume's contents to a runner-owned
      # path. The post-hook of `Restore /nix volume tar (cache)` above will
      # archive this tar file at job end.
      - name: Inspect + dump /nix volume to tar
        run: |
          set -x
          docker volume ls --filter name=devcell-nix-store
          docker volume inspect devcell-nix-store-${{ matrix.arch }} || true
          # Host-side view of where Docker puts the volume (often
          # /var/lib/docker/volumes/...; may differ on rootless or alt drivers).
          # `sudo` because volume mountpoints are root-owned.
          MP=$(docker volume inspect -f '{{ .Mountpoint }}' devcell-nix-store-${{ matrix.arch }})
          echo "Mountpoint: $MP"
          sudo du -sh "$MP" 2>&1 | head -5 || true
          sudo ls -la "$MP" 2>&1 | head -10 || true
          # Container-side: definitive view of what's actually on the volume,
          # without sudo on the host.
          docker run --rm -v devcell-nix-store-${{ matrix.arch }}:/nix alpine sh -c '
            echo "--- container-side /nix ---"
            du -sh /nix
            echo "--- top-level entries ---"
            ls /nix | head -20
            echo "--- /nix/store sample ---"
            ls /nix/store 2>/dev/null | head -5 || echo "(no /nix/store)"
          '
          # Tar dump for caching. -ro mount so we never accidentally write
          # back to the volume. Plain tar (no gzip) — actions/cache zstd
          # compresses on its side and nix store has lots of incompressible
          # content already.
          mkdir -p /tmp/devcell-cache
          docker run --rm \
            -v devcell-nix-store-${{ matrix.arch }}:/nix:ro \
            -v /tmp/devcell-cache:/out \
            alpine tar -cf /out/nix-store.tar -C /nix .
          ls -lh /tmp/devcell-cache/nix-store.tar

  docker-test:
    name: Docker Test (${{ matrix.arch }})
    needs: docker-build
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5

      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LC=${IMAGE_NAME,,}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      # Restore the nix-store volume tar that docker-build saved. Tests that
      # invoke `cell shell` / `cell claude` will mount this volume into the
      # container (`devcell-nix-store:/nix`), so the home-manager activation
      # tree is already resolved — no lazy `cell build --thin` triggered at
      # test time, no minute-long timeouts.
      - name: Restore /nix volume tar from cache
        id: nix-cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/devcell-cache/nix-store.tar
          key: devcell-nix-store-tar-${{ matrix.arch }}-${{ hashFiles('nixhome/**') }}
          restore-keys: |
            devcell-nix-store-tar-${{ matrix.arch }}-

      - name: Hydrate /nix volume from tar
        if: steps.nix-cache.outputs.cache-hit == 'true' || hashFiles('/tmp/devcell-cache/nix-store.tar') != ''
        run: |
          set -e
          ls -lh /tmp/devcell-cache/nix-store.tar
          docker volume create devcell-nix-store-${{ matrix.arch }} >/dev/null
          docker run --rm \
            -v devcell-nix-store-${{ matrix.arch }}:/nix \
            -v /tmp/devcell-cache:/cache:ro \
            alpine sh -c 'cd /nix && tar -xf /cache/nix-store.tar && echo "hydrated $(du -sh /nix | cut -f1)"'
          # Default volume name expected by `cell build --thin` and runtime
          # callers when DEVCELL_NIX_VOLUME is not set. Tests don't set it,
          # so alias the per-arch volume to the default name.
          docker volume create devcell-nix-store >/dev/null
          docker run --rm \
            -v devcell-nix-store-${{ matrix.arch }}:/from:ro \
            -v devcell-nix-store:/to \
            alpine sh -c 'cd /from && tar -cf - . | (cd /to && tar -xf -) && echo "mirrored to devcell-nix-store: $(du -sh /to | cut -f1)"'

      - name: Show volume status (debug)
        run: |
          docker volume ls --filter name=devcell-nix-store || true
          docker run --rm -v devcell-nix-store:/nix alpine sh -c 'du -sh /nix; ls /nix/store 2>/dev/null | head -3 || echo "(no /nix/store)"'

      - name: Pull test images (base + ultimate)
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:v0.0.0-${{ matrix.arch }}-base
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:v0.0.0-${{ matrix.arch }}-ultimate

      - name: Run container tests
        # Both `DEVCELL_USER_IMAGE` and `DEVCELL_TEST_IMAGE` point at the
        # ultimate image (every module + tool baked in) so module-aware tests
        # (kicad, plex, gui) find what they need. `DEVCELL_TEST_BASE_IMAGE`
        # points at the smaller base image for entrypoint-only tests
        # (TestEntrypoint_DebugTimestamps etc.). Setting `DEVCELL_USER_IMAGE`
        # without `DEVCELL_USER_IMAGE_THIN` works because UserImageTagThin()
        # falls back to DEVCELL_USER_IMAGE as-is (no `-thin` suffix appended)
        # per CELL-286 prep.
        env:
          DEVCELL_TEST_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:v0.0.0-${{ matrix.arch }}-ultimate
          DEVCELL_USER_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:v0.0.0-${{ matrix.arch }}-ultimate
          DEVCELL_TEST_BASE_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:v0.0.0-${{ matrix.arch }}-base
          DEVCELL_TEST_PROJECT_DIR: ${{ runner.temp }}/devcell-test
          MCP_SECRET_TEST_PASSWORD: fake-secret-ci-value
          MCP_SECRET_GITHUB_TOKEN: fake-token-ci-value
        run: go test -v -timeout 1200s ./test/...

  docker-manifest:
    name: Docker Manifests
    needs: [docker-build]
    if: always() && needs.docker-build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LC=${IMAGE_NAME,,}" >> $GITHUB_ENV
        env:
          IMAGE_NAME: ${{ github.repository }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GHCR manifests (per stack + ultimate as canonical)
        run: |
          R=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}
          # Per-stack multi-arch manifests
          docker buildx imagetools create \
            -t "${R}:v0.0.0-base" \
            "${R}:v0.0.0-amd64-base" \
            "${R}:v0.0.0-arm64-base"
          docker buildx imagetools create \
            -t "${R}:v0.0.0-ultimate" \
            -t "${R}:v0.0.0" \
            -t "${R}:latest" \
            -t "${R}:dev" \
            "${R}:v0.0.0-amd64-ultimate" \
            "${R}:v0.0.0-arm64-ultimate"

  cell-build:
    name: Cell CLI Dev Build
    needs: secrets
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: v0.0.0
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set SHORT_SHA
        run: echo "SHORT_SHA=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_ENV

      - name: Delete existing tag
        run: |
          git config --global user.email "dmitry@atd.sh"
          git config --global user.name "Dmitry Kireev"
          git tag -d "${{ env.RELEASE_VERSION }}" || echo "No local tag to delete"
          git push origin :refs/tags/${{ env.RELEASE_VERSION }} || echo "No remote tag to delete"

      - name: Add tag
        run: |
          git tag -a ${{ env.RELEASE_VERSION }} -m "Development release"
          git push origin ${{ github.ref_name }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean -f .goreleaser.dev.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          SHORT_SHA: ${{ env.SHORT_SHA }}

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ env.RELEASE_VERSION }}" --draft=false --latest=false --prerelease

  e2e-install:
    name: E2E Install (${{ matrix.arch }})
    needs: [cell-build, docker-manifest]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - name: Download cell binary
        run: |
          TARBALL="cell-linux-${{ matrix.arch }}.tar.gz"
          URL="https://github.com/DimmKirr/devcell/releases/download/v0.0.0/${TARBALL}"
          echo "Downloading: ${URL}"
          curl -fsSL -o "${TARBALL}" "${URL}"
          tar xzf "${TARBALL}"
          chmod +x cell
          sudo mv cell /usr/local/bin/cell

      - name: Verify cell binary
        run: |
          cell --help
          echo "--- cell binary OK ---"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run cell claude --version (full pipeline)
        env:
          DEVCELL_NIXHOME_PATH: ${{ github.workspace }}/nixhome
        run: |
          # Simulate a new user in a fresh project dir
          mkdir -p /tmp/e2e-project && cd /tmp/e2e-project

          # --plain-text: disable spinners for CI
          # Flow: scaffold devcell.toml → pull base image → build user image → start container → print claude version
          OUTPUT=$(cell --plain-text claude --version 2>&1) || true
          echo "$OUTPUT"

          # Assert cell version string is present
          if echo "$OUTPUT" | grep -qE "cell\s+v?[0-9]+\.[0-9]+\.[0-9]+"; then
            echo "--- PASS: cell version found ---"
          else
            echo "--- FAIL: cell version string not found in output ---"
            exit 1
          fi

          # Assert the image was built (user image should exist now)
          if echo "$OUTPUT" | grep -qiE "(building|built|image)"; then
            echo "--- PASS: image build occurred ---"
          else
            echo "--- WARN: no build output detected (image may have been cached) ---"
          fi

  brew-install:
    name: Brew Install (${{ matrix.arch }})
    needs: [cell-build]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    steps:
      - name: Install Homebrew
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" < /dev/null
          echo "/home/linuxbrew/.linuxbrew/bin" >> $GITHUB_PATH

      - name: Brew install devcell-dev
        run: |
          brew tap devcell-sh/tap
          # Homebrew 4.5+ refuses to load casks from third-party taps without
          # explicit trust. `brew trust devcell-sh/tap` trusts every cask in
          # the tap so non-interactive installs succeed.
          brew trust devcell-sh/tap
          brew install --cask devcell-dev || true
          # Verify binary was actually linked despite potential broken pipe
          if ! command -v cell &>/dev/null; then
            echo "Binary not found, retrying..."
            brew install --cask devcell-dev
          fi

      - name: Verify version
        run: |
          INSTALLED=$(cell --version)
          echo "Installed: ${INSTALLED}"
          if echo "${INSTALLED}" | grep -qE "^cell version [0-9]+\.[0-9]+\.[0-9]+"; then
            echo "--- PASS: cell version OK ---"
          else
            echo "--- FAIL: unexpected version output ---"
            exit 1
          fi
