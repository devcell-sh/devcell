name: Release Build

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

on:
  release:
    types:
      - created
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker-build:
    name: Docker Build (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5

      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LC=${IMAGE_NAME,,}" >> $GITHUB_ENV

      - name: Set VERSION from tag
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af
          df -h


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # task cell:build = swagger:generate → CGO_ENABLED=0 go build with ldflags
      # for GitCommit + BuildDate. Single source of truth shared with local dev.
      - name: Build cell binary
        run: task cell:build

      # Hydrate /nix volume from the GHCR cache image populated by
      # build.dev.yml (same `nix-cache-${arch}-*` tag scheme). Release
      # builds reuse the same nixhome closure as dev builds for any
      # given `hashFiles('nixhome/**')`, so the cache is interchangeable.
      - name: Stream-hydrate /nix volume from prior GHCR cache (if available)
        run: |
          set -eo pipefail
          HASH=${{ hashFiles('nixhome/**') }}
          EXACT="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:nix-cache-${{ matrix.arch }}-${HASH}"
          LATEST="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:nix-cache-${{ matrix.arch }}-latest"
          IMG=""
          for c in "$EXACT" "$LATEST"; do
            if docker manifest inspect "$c" >/dev/null 2>&1; then
              IMG="$c"
              break
            fi
          done
          if [ -z "$IMG" ]; then
            echo "cache MISS — starting from empty volume"
            exit 0
          fi
          echo "cache HIT: $IMG"
          docker volume rm devcell-nix-store-${{ matrix.arch }} 2>/dev/null || true
          docker volume create devcell-nix-store-${{ matrix.arch }} >/dev/null
          if ! ./bin/cell nix-store pull \
                 --image "$IMG" \
                 --volume "devcell-nix-store-${{ matrix.arch }}"; then
            echo "WARN: cache pull failed — falling back to MISS, rebuilding fresh"
            docker volume rm devcell-nix-store-${{ matrix.arch }} 2>/dev/null || true
            docker volume create devcell-nix-store-${{ matrix.arch }} >/dev/null
          fi

      - name: Build thin image
        id: build
        env:
          DEVCELL_NIX_VOLUME: devcell-nix-store-${{ matrix.arch }}
          DEVCELL_NIXHOME_PATH: ${{ github.workspace }}/nixhome
        run: |
          TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ env.VERSION }}-${{ matrix.arch }}"
          ./bin/cell build --thin --image "$TAG" --debug
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Push to GHCR
        run: docker push ${{ steps.build.outputs.tag }}

      # Publish the populated /nix volume back to the GHCR cache so
      # subsequent dev + release builds can reuse it.
      - name: Stream-publish /nix volume to GHCR cache image
        timeout-minutes: 80
        run: |
          set -eo pipefail
          HASH=${{ hashFiles('nixhome/**') }}
          LATEST="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:nix-cache-${{ matrix.arch }}-latest"
          EXACT="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:nix-cache-${{ matrix.arch }}-${HASH}"
          docker run --rm -v devcell-nix-store-${{ matrix.arch }}:/nix:ro alpine \
            tar -cf - \
              --exclude='nix/var/nix/daemon-socket' \
              -C / nix \
            | ./bin/cell nix-store push \
                --base public.ecr.aws/docker/library/busybox:latest \
                --image "$LATEST"
          # Alias *-latest to the content-hashed tag without re-uploading blobs.
          docker buildx imagetools create --tag "$EXACT" "$LATEST"

  docker-manifest:
    name: Docker Manifests
    needs: docker-build
    runs-on: ubuntu-latest
    steps:
      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LC=${IMAGE_NAME,,}" >> $GITHUB_ENV
        env:
          IMAGE_NAME: ${{ github.repository }}

      - name: Set VERSION from tag
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push GHCR multi-arch manifests
        run: |
          R=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}
          V=${{ env.VERSION }}
          docker buildx imagetools create \
            -t "${R}:${V}" \
            -t "${R}:latest" \
            "${R}:${V}-amd64" \
            "${R}:${V}-arm64"

      - name: Inspect manifests
        run: |
          R=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}
          V=${{ env.VERSION }}
          echo "=== ${V} ==="
          docker buildx imagetools inspect "${R}:${V}"

  cell-release:
    name: Cell CLI Release Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set env
        run: |
          echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
          echo "SHORT_SHA=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_ENV

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean -f .goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          SHORT_SHA: ${{ env.SHORT_SHA }}

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ env.RELEASE_VERSION }}" --draft=false --latest=false

  e2e-install:
    name: E2E Install (${{ matrix.arch }})
    needs: [cell-release, docker-manifest]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - name: Set version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Download cell binary
        run: |
          TARBALL="cell-linux-${{ matrix.arch }}.tar.gz"
          URL="https://github.com/DimmKirr/devcell/releases/download/${VERSION}/${TARBALL}"
          echo "Downloading: ${URL}"
          curl -fsSL -o "${TARBALL}" "${URL}"
          tar xzf "${TARBALL}"
          chmod +x cell
          sudo mv cell /usr/local/bin/cell

      - name: Verify cell binary
        run: |
          cell --help
          echo "--- cell binary OK ---"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run cell claude --version (full pipeline)
        env:
          DEVCELL_NIXHOME_PATH: ${{ github.workspace }}/nixhome
        run: |
          # Simulate a new user in a fresh project dir
          mkdir -p /tmp/e2e-project && cd /tmp/e2e-project

          # Flow: scaffold devcell.toml → pull base image → build user image → start container → print claude version
          OUTPUT=$(cell --plain-text claude --version 2>&1) || true
          echo "$OUTPUT"

          # Assert cell version string is present
          if echo "$OUTPUT" | grep -qE "cell\s+v?[0-9]+\.[0-9]+\.[0-9]+"; then
            echo "--- PASS: cell version found ---"
          else
            echo "--- FAIL: cell version string not found in output ---"
            exit 1
          fi
