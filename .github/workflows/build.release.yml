name: Release Build

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

on:
  release:
    types:
      - created
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  ECR_REGISTRY: public.ecr.aws/w1l3v2k8/devcell

jobs:
  docker-build:
    name: Docker Build (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
            platform: linux/amd64
          - runner: blacksmith-4vcpu-ubuntu-2404-arm
            arch: arm64
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LC=${IMAGE_NAME,,}" >> $GITHUB_ENV

      - name: Set VERSION from tag
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af
          df -h


      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ECR_ROLE_ARN }}
          aws-region: us-east-1

      - name: Log in to ECR Public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Build and push release group (GHCR)
        run: >-
          docker buildx bake
          --set '*.output=type=image,push=true,oci-mediatypes=true,compression=zstd,compression-level=3,force-compression=true'
          release
        env:
          VERSION: ${{ env.VERSION }}-${{ matrix.arch }}
          PLATFORMS: ${{ matrix.platform }}
          REGISTRY: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}
          CACHE_ARCH: -${{ matrix.arch }}

      - name: Push to ECR Public
        run: |
          GHCR=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}
          ECR=${{ env.ECR_REGISTRY }}
          V=${{ env.VERSION }}-${{ matrix.arch }}
          for suffix in "" "-core" "-ultimate"; do
            SRC="${GHCR}:${V}${suffix}"
            DST="${ECR}:${V}${suffix}"
            docker buildx imagetools create -t "${DST}" "${SRC}"
          done

  docker-manifest:
    name: Docker Manifests
    needs: docker-build
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LC=${IMAGE_NAME,,}" >> $GITHUB_ENV
        env:
          IMAGE_NAME: ${{ github.repository }}

      - name: Set VERSION from tag
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ECR_ROLE_ARN }}
          aws-region: us-east-1

      - name: Log in to ECR Public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Create and push GHCR multi-arch manifests
        run: |
          R=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}
          V=${{ env.VERSION }}
          for suffix in "" "-core" "-ultimate"; do
            docker buildx imagetools create \
              -t "${R}:${V}${suffix}" \
              "${R}:${V}-amd64${suffix}" \
              "${R}:${V}-arm64${suffix}"
          done

      - name: Create and push ECR Public multi-arch manifests
        run: |
          ECR=${{ env.ECR_REGISTRY }}
          V=${{ env.VERSION }}
          for suffix in "" "-core" "-ultimate"; do
            docker buildx imagetools create \
              -t "${ECR}:${V}${suffix}" \
              "${ECR}:${V}-amd64${suffix}" \
              "${ECR}:${V}-arm64${suffix}"
          done

      - name: Inspect manifests
        run: |
          R=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}
          V=${{ env.VERSION }}
          for tag in "${V}" "${V}-core" "${V}-ultimate"; do
            echo "=== ${tag} ==="
            docker buildx imagetools inspect "${R}:${tag}"
          done

  pure-build:
    name: Pure Image (${{ matrix.arch }}, ${{ matrix.stack }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest,    arch: amd64, stack: base }
          - { runner: ubuntu-latest,    arch: amd64, stack: ultimate }
          - { runner: ubuntu-24.04-arm, arch: arm64, stack: base }
          - { runner: ubuntu-24.04-arm, arch: arm64, stack: ultimate }
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LC=${IMAGE_NAME,,}" >> $GITHUB_ENV

      - name: Set VERSION from tag
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af
          df -h

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            sandbox = false
            filter-syscalls = false
            max-substitution-jobs = 128
            http-connections = 128

      - name: Cache /nix/store
        uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ matrix.arch }}-${{ matrix.stack }}-${{ hashFiles('nixhome/flake.lock', 'nixhome/**/*.nix') }}
          restore-prefixes-first-match: nix-${{ matrix.arch }}-${{ matrix.stack }}-
          purge: true
          purge-prefixes: nix-${{ matrix.arch }}-${{ matrix.stack }}-
          purge-created: 604800
          purge-primary-key: never
          gc-max-store-size-linux: 5000000000

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ECR_ROLE_ARN }}
          aws-region: us-east-1

      - name: Log in to ECR Public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push pure image to GHCR
        run: task image:pure:push:${{ matrix.stack }}
        env:
          ARCH: ${{ matrix.arch }}
          STACK: ${{ matrix.stack }}
          REGISTRY: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}
          TAG: ${{ env.VERSION }}-${{ matrix.arch }}-${{ matrix.stack }}-pure
          SUDO: ""
          NIX: nix
          DEVCELL_BUILD_DATE: ${{ github.event.release.created_at }}
          DEVCELL_BUILD_REV:  ${{ github.sha }}

      - name: Mirror pure image to ECR Public
        run: task image:mirror
        env:
          SRC: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ env.VERSION }}-${{ matrix.arch }}-${{ matrix.stack }}-pure
          DST: ${{ env.ECR_REGISTRY }}:${{ env.VERSION }}-${{ matrix.arch }}-${{ matrix.stack }}-pure

  pure-manifest:
    name: Pure Image Manifests
    needs: pure-build
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE_NAME_LC=${IMAGE_NAME,,}" >> $GITHUB_ENV
        env:
          IMAGE_NAME: ${{ github.repository }}

      - name: Set VERSION from tag
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ECR_ROLE_ARN }}
          aws-region: us-east-1

      - name: Log in to ECR Public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Stitch multi-arch GHCR manifests (pure)
        run: |
          for stack in base ultimate; do
            task image:manifest \
              REPO=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }} \
              VERSION=${{ env.VERSION }} \
              SUFFIX=-${stack}-pure \
              ARCHES=amd64,arm64
          done

      - name: Stitch multi-arch ECR Public manifests (pure)
        run: |
          for stack in base ultimate; do
            task image:manifest \
              REPO=${{ env.ECR_REGISTRY }} \
              VERSION=${{ env.VERSION }} \
              SUFFIX=-${stack}-pure \
              ARCHES=amd64,arm64
          done

  cell-release:
    name: Cell CLI Release Build
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set env
        run: |
          echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
          echo "SHORT_SHA=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_ENV

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean -f .goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          SHORT_SHA: ${{ env.SHORT_SHA }}

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ env.RELEASE_VERSION }}" --draft=false --latest=false

  e2e-install:
    name: E2E Install (${{ matrix.arch }})
    needs: [cell-release, docker-manifest]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: blacksmith-4vcpu-ubuntu-2404-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - name: Set version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Download cell binary
        run: |
          TARBALL="cell-linux-${{ matrix.arch }}.tar.gz"
          URL="https://github.com/DimmKirr/devcell/releases/download/${VERSION}/${TARBALL}"
          echo "Downloading: ${URL}"
          curl -fsSL -o "${TARBALL}" "${URL}"
          tar xzf "${TARBALL}"
          chmod +x cell
          sudo mv cell /usr/local/bin/cell

      - name: Verify cell binary
        run: |
          cell --help
          echo "--- cell binary OK ---"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run cell claude --version (full pipeline)
        env:
          DEVCELL_NIXHOME_PATH: ${{ github.workspace }}/nixhome
        run: |
          # Simulate a new user in a fresh project dir
          mkdir -p /tmp/e2e-project && cd /tmp/e2e-project

          # Flow: scaffold devcell.toml → pull base image → build user image → start container → print claude version
          OUTPUT=$(cell --plain-text claude --version 2>&1) || true
          echo "$OUTPUT"

          # Assert cell version string is present
          if echo "$OUTPUT" | grep -qE "cell\s+v?[0-9]+\.[0-9]+\.[0-9]+"; then
            echo "--- PASS: cell version found ---"
          else
            echo "--- FAIL: cell version string not found in output ---"
            exit 1
          fi
