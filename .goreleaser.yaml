version: 2

project_name: cell

before:
  hooks:
    - go run github.com/swaggo/swag/cmd/swag@latest init -g cmd/serve.go -o docs --parseDependency --parseInternal

builds:
  - id: cell
    main: ./cmd
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
        -X 'github.com/DimmKirr/devcell/internal/version.Version={{.Version}}'
        -X 'github.com/DimmKirr/devcell/internal/version.GitCommit={{.Env.SHORT_SHA}}'

archives:
  - id: release_archive
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    files:
      - LICENSE
      - README.md

release:
  github:
    owner: DimmKirr
    name: devcell
  draft: true
  replace_existing_draft: true
  make_latest: false

changelog:
  sort: asc
  use: git
  groups:
    - title: "Features"
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: "Bug Fixes"
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: "Chores"
      regexp: '^.*?chore(\(.+\))??!?:.+$'
      order: 2
    - title: "Tests"
      regexp: '^.*?test(\(.+\))??!?:.+$'
      order: 3
    - title: "Other"
      order: 999
  filters:
    exclude:
      - 'Merge pull request'
      - 'Merge branch'

checksum:
  name_template: "{{ .ProjectName }}-checksums.txt"

homebrew_casks:
  - name: devcell
    repository:
      owner: DimmKirr
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    url:
      template: "https://github.com/DimmKirr/devcell/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    commit_author:
      name: Dmitry Kireev
      email: dmitry@atd.sh
    homepage: "https://github.com/DimmKirr/devcell"
    description: "Run AI coding agents in a consistent Docker dev environment"
    conflicts:
      - cask: devcell-dev
    binaries: ["cell"]

  - name: "devcell@{{ .Version }}"
    repository:
      owner: DimmKirr
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    url:
      template: "https://github.com/DimmKirr/devcell/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    commit_author:
      name: Dmitry Kireev
      email: dmitry@atd.sh
    homepage: "https://github.com/DimmKirr/devcell"
    description: "Run AI coding agents in a consistent Docker dev environment"
    conflicts:
      - cask: devcell-dev
    binaries: ["cell"]
